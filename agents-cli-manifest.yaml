# customer-support-agent/agents-cli-manifest.yaml
name: customer-support-agent

# Указываем на внутреннюю папку app, где лежит исполняемый код
agent_directory: app
base_template: adk
language: python
create_params:
  deployment_target: agent_runtime
  cicd_runner: skip
  include_data_ingestion: false
  datastore: none
  agent_guidance_filename: GEMINI.md